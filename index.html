<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Pointage</title>
</head>
<body>

<h2>Pointage employé</h2>

<label>Nom :</label><br>
<input type="text" id="nom"><br><br>

<label>Date :</label><br>
<input type="date" id="date"><br><br>

<label>Heure arrivée :</label><br>
<select id="arrivee"></select><br><br>

<label>Heure départ :</label><br>
<select id="depart"></select><br><br>

<button onclick="envoyer()">Envoyer</button>

<script>
  // remplir heures sans bug
  let arrivee = document.getElementById("arrivee");
  let depart = document.getElementById("depart");

  for (let h = 8; h <= 20; h++) {
    let heure = (h < 10 ? "0" + h : h) + ":00";

    let o1 = document.createElement("option");
    o1.text = heure;
    o1.value = heure;
    arrivee.add(o1);

    let o2 = document.createElement("option");
    o2.text = heure;
    o2.value = heure;
    depart.add(o2);
  }

  // date automatique
  document.getElementById("date").valueAsDate = new Date();

  function envoyer() {
    let data = {
      nom: document.getElementById("nom").value,
      date: document.getElementById("date").value,
      arrivee: arrivee.value,
      depart: depart.value
    };

    console.log(data);
    alert("Envoyé !");
  }
</script>

</body>
</html>
